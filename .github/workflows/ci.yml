name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/14_valorisationdonneemeteo/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/14_valorisationdonneemeteo/frontend
  # Custom registry (optional): set repo variable CUSTOM_REGISTRY_PUSH=true and secrets below
  CUSTOM_REGISTRY: registry.sector16.uk
  CUSTOM_BACKEND_IMAGE: registry.sector16.uk/valorisationdonneemeteo-backend
  CUSTOM_FRONTEND_IMAGE: registry.sector16.uk/valorisationdonneemeteo-frontend
  TRIVY_IMAGE: aquasec/trivy:0.70.0
  OPENVEX_FILE: security/openvex.json

jobs:
  backend:
    name: Backend - install / test / lint / scan / docker
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:2.25.0-pg17
        env:
          POSTGRES_DB: meteodb
          POSTGRES_USER: infoclimat
          POSTGRES_PASSWORD: infoclimat2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U infoclimat -d meteodb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SETTINGS_MODULE: config.settings
      SECRET_KEY: django-insecure-ci-secret
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DB_NAME: meteodb
      DB_USER: infoclimat
      DB_PASSWORD: infoclimat2026
      DB_HOST: localhost
      DB_PORT: "5432"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.0"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Run tests with JUnit and coverage reports
        run: >-
          uv run pytest
          --junitxml=reports/junit.xml
          --cov=config
          --cov=weather
          --cov-report=xml:reports/coverage.xml

      - name: Run linter
        run: uv run ruff check config weather

      - name: Run format check
        run: uv run ruff format --check config weather

      - name: Run SAST scan with Bandit
        run: >-
          uv run bandit -r config weather
          -f json -o reports/bandit.json
          --exit-zero

      - name: Run dependency scan with pip-audit
        run: uv run pip-audit -f json -o reports/pip-audit.json || true

      - name: Build backend Docker image
        run: docker build -t "${BACKEND_IMAGE}:${GITHUB_SHA}" .

      - name: Run Trivy image scan
        run: >-
          docker run --rm
          -v /var/run/docker.sock:/var/run/docker.sock
          -v "${{ github.workspace }}:/workspace"
          "${TRIVY_IMAGE}" image
          --format json
          --output /workspace/backend/reports/trivy-backend-image.json
          --vex /workspace/${OPENVEX_FILE}
          --severity HIGH,CRITICAL
          --exit-code 0
          "${BACKEND_IMAGE}:${GITHUB_SHA}"

      - name: Upload backend CI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-ci-reports
          path: backend/reports/
          if-no-files-found: warn

      - name: Upload OpenVEX document
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openvex-document
          path: security/openvex.json
          if-no-files-found: error

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend Docker image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker tag "${BACKEND_IMAGE}:${GITHUB_SHA}" "${BACKEND_IMAGE}:latest"
          docker push "${BACKEND_IMAGE}:${GITHUB_SHA}"
          docker push "${BACKEND_IMAGE}:latest"

      - name: Log in to custom container registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.CUSTOM_REGISTRY_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CUSTOM_REGISTRY }}
          username: ${{ secrets.CUSTOM_REGISTRY_USER }}
          password: ${{ secrets.CUSTOM_REGISTRY_TOKEN }}

      - name: Push backend to custom registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.CUSTOM_REGISTRY_PUSH == 'true'
        run: |
          docker tag "${BACKEND_IMAGE}:${GITHUB_SHA}" "${CUSTOM_BACKEND_IMAGE}:${GITHUB_SHA}"
          docker tag "${BACKEND_IMAGE}:${GITHUB_SHA}" "${CUSTOM_BACKEND_IMAGE}:latest"
          docker push "${CUSTOM_BACKEND_IMAGE}:${GITHUB_SHA}"
          docker push "${CUSTOM_BACKEND_IMAGE}:latest"

  frontend:
    name: Frontend - install / test / lint / scan / docker
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Run tests with JUnit report
        run: >-
          npm run test:unit --
          --reporter=default
          --reporter=junit
          --outputFile.junit=reports/junit.xml

      - name: Run linter
        run: npm run lint

      - name: Run dependency scan with npm audit
        run: npm audit --audit-level=high --json > reports/npm-audit.json || true

      - name: Build frontend Docker image
        run: docker build -t "${FRONTEND_IMAGE}:${GITHUB_SHA}" .

      - name: Run Trivy image scan
        run: >-
          docker run --rm
          -v /var/run/docker.sock:/var/run/docker.sock
          -v "${{ github.workspace }}:/workspace"
          "${TRIVY_IMAGE}" image
          --format json
          --output /workspace/frontend/reports/trivy-frontend-image.json
          --vex /workspace/${OPENVEX_FILE}
          --severity HIGH,CRITICAL
          --exit-code 0
          "${FRONTEND_IMAGE}:${GITHUB_SHA}"

      - name: Upload frontend CI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-ci-reports
          path: frontend/reports/
          if-no-files-found: warn

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push frontend Docker image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker tag "${FRONTEND_IMAGE}:${GITHUB_SHA}" "${FRONTEND_IMAGE}:latest"
          docker push "${FRONTEND_IMAGE}:${GITHUB_SHA}"
          docker push "${FRONTEND_IMAGE}:latest"

      - name: Log in to custom container registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.CUSTOM_REGISTRY_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CUSTOM_REGISTRY }}
          username: ${{ secrets.CUSTOM_REGISTRY_USER }}
          password: ${{ secrets.CUSTOM_REGISTRY_TOKEN }}

      - name: Push frontend to custom registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.CUSTOM_REGISTRY_PUSH == 'true'
        run: |
          docker tag "${FRONTEND_IMAGE}:${GITHUB_SHA}" "${CUSTOM_FRONTEND_IMAGE}:${GITHUB_SHA}"
          docker tag "${FRONTEND_IMAGE}:${GITHUB_SHA}" "${CUSTOM_FRONTEND_IMAGE}:latest"
          docker push "${CUSTOM_FRONTEND_IMAGE}:${GITHUB_SHA}"
          docker push "${CUSTOM_FRONTEND_IMAGE}:latest"